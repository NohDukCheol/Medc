<!doctype html>
<html lang="ko"> <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0052CC" /> <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <title>MedClaw: AI Nursing Support</title>
  </head>
  <body>
    <div id="root"></div>
    
    <script type="module" src="/src/main.tsx"></script>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('MedClaw PWA 서비스 워커 등록 완료!', reg.scope))
            .catch(err => console.log('PWA 등록 실패:', err));
        });
      }
    </script>
  </body>
</html>
